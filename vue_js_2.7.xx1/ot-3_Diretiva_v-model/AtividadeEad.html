<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 - Atividade EAD: v-model com Formulário</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f0f2f5;
    }
    h2 { color: #42b883; border-bottom: 2px solid #42b883; padding-bottom: 6px; }
    .card {
      background: white;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 2px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
      font-size: 15px;
      transition: border-color 0.2s;
    }
    input.invalido { border-color: #e74c3c; }
    input.valido   { border-color: #42b883; }
    .erro-msg {
      color: #e74c3c;
      font-size: 12px;
      min-height: 16px;
      margin-bottom: 10px;
    }
    button {
      background: #42b883;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 15px;
    }
    button:disabled { background: #b2dfcf; cursor: not-allowed; }
    button:not(:disabled):hover { background: #369870; }
    .dado { margin: 6px 0; color: #333; }
    .dado span { font-weight: bold; color: #42b883; }
  </style>

<style id="chatgpt-theme">
:root{
 --bg:#eef2ff;--card:#ffffff;--primary:#4f46e5;--primary2:#7c3aed;
 --text:#1f2937;--muted:#6b7280;--border:#e5e7eb;
}
*{box-sizing:border-box}
body{
 margin:0;padding:32px;
 font-family:'Segoe UI',Tahoma,sans-serif;
 color:var(--text);
 background:
 radial-gradient(circle at top right,#c7d2fe 0,#eef2ff 35%,#f8fafc 100%);
}
#app,.app,.container{
 max-width:1100px;
 margin:auto;
 background:var(--card);
 border-radius:18px;
 padding:30px;
 box-shadow:0 18px 40px rgba(79,70,229,.12);
 border:1px solid rgba(255,255,255,.5);
}
h1,h2,h3{
 margin-top:0;
 color:var(--primary);
 border-left:6px solid var(--primary2);
 padding-left:12px;
}
p,label,span{line-height:1.6}
input,select,textarea{
 width:100%;
 max-width:420px;
 padding:12px 14px;
 border:1px solid var(--border);
 border-radius:12px;
 outline:none;
 transition:.25s;
 background:#fff;
}
input:focus,select:focus,textarea:focus{
 border-color:var(--primary);
 box-shadow:0 0 0 4px rgba(79,70,229,.12);
}
button{
 background:linear-gradient(135deg,var(--primary),var(--primary2));
 color:#fff;
 border:none;
 border-radius:12px;
 padding:12px 20px;
 font-weight:600;
 cursor:pointer;
 transition:.25s;
}
button:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(79,70,229,.25)}
table{
 width:100%;
 border-collapse:collapse;
 background:#fff;
 border-radius:12px;
 overflow:hidden;
}
th{
 background:linear-gradient(135deg,var(--primary),var(--primary2));
 color:#fff;
}
th,td{
 padding:12px;
 border-bottom:1px solid var(--border);
 text-align:left;
}
code{
 background:#eef2ff;
 padding:2px 6px;
 border-radius:6px;
 color:#4338ca;
}
</style>

</head>
<body>
  <div id="app">

    <div class="card">
      <h2>Formulário Básico</h2>

      <label>Nome:</label>
      <input
        type="text"
        v-model="nome"
        placeholder="Digite seu nome completo"
        :class="{ invalido: nome && !nomeValido, valido: nome && nomeValido }"
      >
      <p class="erro-msg">{{ nome && !nomeValido ? 'Nome deve ter ao menos 2 letras e conter apenas letras e espaços.' : '' }}</p>

      <label>E-mail:</label>
      <input
        type="email"
        v-model="email"
        placeholder="exemplo@email.com"
        :class="{ invalido: email && !emailValido, valido: email && emailValido }"
      >
      <p class="erro-msg">{{ email && !emailValido ? 'Informe um e-mail válido (ex: nome@dominio.com).' : '' }}</p>

      <button @click="enviar" :disabled="!formularioValido">Enviar</button>
    </div>

    <div class="card">
      <h2>Dados do Formulário</h2>
      <p class="dado">Nome: <span>{{ nome || '—' }}</span></p>
      <p class="dado">E-mail: <span>{{ email || '—' }}</span></p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@2.7.16/dist/vue.js"></script>
  <script>
    new Vue({
      el: '#app',
      data: {
        nome: '',
        email: ''
      },
      computed: {
        nomeValido() {
          return /^[A-Za-zÀ-ÿ]{2,}([A-Za-zÀ-ÿ\s]*)?$/.test(this.nome.trim())
        },
        emailValido() {
          return /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(this.email.trim())
        },
        formularioValido() {
          return this.nomeValido && this.emailValido
        }
      },
      methods: {
        enviar() {
          alert('Dados enviados!\n\nNome: ' + this.nome + '\nE-mail: ' + this.email)
        }
      }
    })
  </script>
</body>
</html>
